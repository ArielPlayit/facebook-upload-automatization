name: facebook-headless-ci

on:
  workflow_dispatch:

jobs:
  run-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Validate required secret
        env:
          FB_CONFIG_JSON_B64: ${{ secrets.FB_CONFIG_JSON_B64 }}
        run: |
          if [ -z "$FB_CONFIG_JSON_B64" ]; then
            echo "Missing required secret: FB_CONFIG_JSON_B64"
            exit 1
          fi

      - name: Build runtime config
        env:
          FB_CONFIG_JSON_B64: ${{ secrets.FB_CONFIG_JSON_B64 }}
        run: |
          mkdir -p headless_ci_facebook/runtime
          echo "$FB_CONFIG_JSON_B64" | base64 --decode > headless_ci_facebook/runtime/config.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r headless_ci_facebook/requirements.txt

      - name: Run headless posting
        env:
          FB_COOKIES_JSON_B64: ${{ secrets.FB_COOKIES_JSON_B64 }}
          FB_EMAIL: ${{ secrets.FB_EMAIL }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          python headless_ci_facebook/facebook_headless_ci.py \
            --config headless_ci_facebook/runtime/config.json \
            --headless \
            --debug-on-failure \
            --strict

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-debug-artifacts
          path: headless_ci_facebook/debug_artifacts
          if-no-files-found: ignore
